name: Branch VSIX

# Builds a .vsix package whenever a feature branch is pushed and publishes it
# as a GitHub pre-release so it can be downloaded directly from the Releases
# page. Each branch gets one pre-release (tag: dev-<sanitized-branch-name>);
# re-pushing the branch recreates it with a fresh build.
#
# All third-party actions are pinned to commit SHAs (not tags) to defend
# against tag-hijack supply-chain attacks.

on:
  push:
    branches-ignore:
      - main

permissions: {}

jobs:
  release-vsix:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create/delete releases and push tags

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Use Node.js 20.x
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build:release

      - name: Package VSIX
        run: npm run package:release

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Derive a safe git tag from the branch name
          BRANCH="${{ github.ref_name }}"
          TAG="dev-$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')"
          VSIX=$(ls *.vsix | head -1)

          # Remove any existing pre-release for this branch so the new build
          # replaces it cleanly (ignore errors if it doesn't exist yet)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" "$VSIX" \
            --prerelease \
            --title "Dev build: $BRANCH" \
            --notes "Automated pre-release built from branch \`$BRANCH\`."
